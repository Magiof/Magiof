# 3D contribution SVGs — uses latest generator so the calendar matches your current GitHub graph.
# First run: Actions → GitHub-Profile-3D-Contrib → Run workflow (forks: enable Actions in repo Settings).
name: GitHub-Profile-3D-Contrib

on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/profile-3d.yml"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    name: generate-github-profile-3d-contrib
    steps:
      - uses: actions/checkout@v4
      - uses: yoshi389111/github-profile-3d-contrib@v0.9.2
        env:
          # For private-repo contributions in the graph, use a PAT secret and map it here:
          # GITHUB_TOKEN: ${{ secrets.PROFILE_CONTRIB_PAT }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add profile-3d-contrib/
          git diff --staged --quiet || (git commit -m "chore: regenerate profile 3d contribution" && git push)
