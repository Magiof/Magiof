# 3D contribution SVGs — upstream: https://github.com/yoshi389111/github-profile-3d-contrib
# Patched v0.9.2 clone: CONTRIBUTION_FROM/CONTRIBUTION_TO는 GraphQL 제약상 최대 ~1년 구간만 헉용됩니다.
# 여러 해를 한 번에 넣으면 API가 user: null 또는 오류를 돌려 fetchData가 실패합니다. 긴 기간은 넣지 마세요.
# Private contributions: https://github.com/settings/profile#contributions-setting
# Optional PAT: PROFILE_CONTRIB_PAT — 비공개 반영용; 없으면 GITHUB_TOKEN만 사용
name: GitHub-Profile-3D-Contrib

on:
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: profile-3d-${{ github.repository }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    name: generate-github-profile-3d-contrib
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build generator (v0.9.2 + range patch)
        run: |
          git clone --depth 1 --branch v0.9.2 https://github.com/yoshi389111/github-profile-3d-contrib.git /tmp/gh-profile-3d
          patch -p1 -d /tmp/gh-profile-3d < "${GITHUB_WORKSPACE}/patches/github-profile-3d-contrib-v0.9.2-contribution-range.patch"
          cd /tmp/gh-profile-3d
          npm ci
          npm run build

      - name: Generate SVGs into profile-3d-contrib/
        working-directory: ${{ github.workspace }}
        env:
          GITHUB_TOKEN: ${{ secrets.PROFILE_CONTRIB_PAT || secrets.GITHUB_TOKEN }}
        run: node /tmp/gh-profile-3d/dist/index.js "${{ github.repository_owner }}"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add profile-3d-contrib/
          git diff --staged --quiet || (git commit -m "chore: regenerate profile 3d contribution" && git push)
