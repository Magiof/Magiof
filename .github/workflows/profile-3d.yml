# 3D contribution SVGs — https://github.com/yoshi389111/github-profile-3d-contrib
# If the graph looks frozen (old dates), run this workflow manually and ensure
# “Include private contributions on my profile” and/or a PAT with repo read (see env below).
name: GitHub-Profile-3D-Contrib

on:
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: profile-3d-${{ github.repository }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    name: generate-github-profile-3d-contrib
    steps:
      - uses: actions/checkout@v5
      - uses: yoshi389111/github-profile-3d-contrib@v0.9.2
        env:
          # For private repos in the graph: create a fine-grained PAT (or classic with read:user, repo)
          # save as e.g. PROFILE_CONTRIB_PAT, then swap the line below.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add profile-3d-contrib/
          git diff --staged --quiet || (git commit -m "chore: regenerate profile 3d contribution" && git push)
