# 3D contribution SVGs — upstream: https://github.com/yoshi389111/github-profile-3d-contrib
# Uses v0.9.2 + small patch so the GraphQL range is 2022-01-01 → today (UTC) instead of ~1 year.
# Private contributions: enable on https://github.com/settings/profile#contributions-setting
# Optional PAT (비공개 기여 GraphQL): 시크릿 이름 PROFILE_CONTRIB_PAT — 만료/오타/권한 부족이면 GraphQL이 user: null 을 돌려 스텝이 실패합니다. 그럴 땐 시크릿을 지우거나 아래 GITHUB_TOKEN 줄만 쓰세요.
name: GitHub-Profile-3D-Contrib

on:
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: profile-3d-${{ github.repository }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    name: generate-github-profile-3d-contrib
    steps:
      - uses: actions/checkout@v5

      - name: End of contribution window (today UTC)
        id: range
        run: echo "to=$(date -u +'%Y-%m-%dT23:59:59.000Z')" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build generator (v0.9.2 + range patch)
        run: |
          git clone --depth 1 --branch v0.9.2 https://github.com/yoshi389111/github-profile-3d-contrib.git /tmp/gh-profile-3d
          patch -p1 -d /tmp/gh-profile-3d < "${GITHUB_WORKSPACE}/patches/github-profile-3d-contrib-v0.9.2-contribution-range.patch"
          cd /tmp/gh-profile-3d
          npm ci
          npm run build

      - name: Generate SVGs into profile-3d-contrib/
        working-directory: ${{ github.workspace }}
        env:
          GITHUB_TOKEN: ${{ secrets.PROFILE_CONTRIB_PAT }}
          CONTRIBUTION_FROM: "2022-01-01T00:00:00.000Z"
          CONTRIBUTION_TO: ${{ steps.range.outputs.to }}
        run: node /tmp/gh-profile-3d/dist/index.js "${{ github.repository_owner }}"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add profile-3d-contrib/
          git diff --staged --quiet || (git commit -m "chore: regenerate profile 3d contribution" && git push)
